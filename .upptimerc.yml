# CollabOps Public Status Page (Upptime) — status.collabops.ai
# 대상: prod(collabops.ai SaaS). 감시 URL/기대코드는 2026-07-06 실측 기반
# (403/401 = 인증 앞단 정상응답 = 서비스 생존 신호). 운영 카드: collabops-infrastructure/this-operation-manual/_OX63-statuspage.md
owner: CollabOps
repo: status

sites:
  - name: CollabOps Cloud
    url: https://collabops.ai
  - name: Web App
    url: https://app.collabops.ai
    expectedStatusCodes: [200, 403]
  - name: API
    url: https://collabops.ai/api/v2/health
    expectedStatusCodes: [200, 401]
  - name: Git / Repository
    url: https://collabops.ai/collabops-one/probe.git/info/refs?service=git-upload-pack
    headers:
      - "User-Agent: git/2.39.5"
    expectedStatusCodes: [200, 401, 404]
  - name: CI/CD
    url: https://tekton.collabops.ai
    expectedStatusCodes: [200, 403]
  - name: Docs
    url: https://docs.collabops.ai
  - name: Notifications
    url: https://ws.collabops.ai

status-website:
  cname: status.collabops.ai
  name: CollabOps Status
  introTitle: "**CollabOps** service status"
  introMessage: Real-time status and uptime history for CollabOps services.
  navbar:
    - title: Status
      href: /
    - title: CollabOps
      href: https://collabops.ai
